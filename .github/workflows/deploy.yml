name: Online proefsite (GitHub Pages)

# Bouwt de Astro-site en publiceert hem als online proefsite op GitHub Pages.
# URL: https://<gebruiker>.github.io/<repo>/  (hier: itzzp.github.io/houtbouw/)
on:
  push:
    branches:
      - main
      - claude/kloosterman-astro-site-mBwml
  workflow_dispatch:

# Rechten die GitHub Pages nodig heeft om te kunnen publiceren.
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwere duwt de oude opzij.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node opzetten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Pages configureren (en zo nodig inschakelen)
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Site bouwen
        env:
          # Site staat in een submap op Pages, dus base-pad = /<repo>.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          SITE_URL: ${{ steps.pages.outputs.origin }}
        run: npm run build

      - name: Build uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publiceren naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
